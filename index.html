    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #22c55e;
            --desc: #6c757d;
            --border: #e0e0e0;
        }

        body.dark {
            --bg: #0b0b0b;
            --card: #161616;
            --text: #f0f0f0;
            --desc: #999999;
            --border: #2a2a2a;
        }

        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        h1 { text-align: center; color: var(--primary); padding: 25px 0 10px 0; margin: 0; font-size: 28px; }

        .search {
            width: 90%; margin: 15px auto; display: block; padding: 15px;
            border-radius: 30px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text); outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stats { display: flex; justify-content: center; gap: 20px; padding: 5px; font-size: 13px; color: var(--primary); font-weight: bold; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 20px;
        }

        @media(max-width:600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
            .game-card img { height: 130px; }
        }

        .game-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: 0.3s;
            border: 1px solid var(--border);
        }

        .game-card img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .content { padding: 15px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .title { font-weight: bold; color: var(--primary); font-size: 15px; }
        .desc { font-size: 11px; color: var(--desc); line-height: 1.4; height: 32px; overflow: hidden; }
        
        button.btn {
            background: var(--primary); border: none; padding: 12px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: auto; color: #fff;
        }

        .tag {
            position: absolute; top: 10px; right: 10px;
            background: var(--primary); color: #fff; padding: 4px 10px;
            border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 5;
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.95); justify-content: center;
            align-items: center; z-index: 9999;
        }

        .modal-box {
            background: var(--card); width: 95%; max-width: 500px;
            border-radius: 25px; position: relative; overflow: hidden;
        }

        #loading-section { padding: 40px 20px; text-align: center; }
        .bar-wrap { height: 12px; background: #eee; border-radius: 20px; overflow: hidden; margin: 20px 0; }
        #bar { height: 100%; width: 0; background: var(--primary); transition: .2s; }
        #frame { width: 100%; height: 600px; border: none; display: none; }
    </style>
</head>

    function render(data) {
        let grid = document.getElementById("grid");
        let html = "";
        for(let i=0; i<data.length; i++) {
            let g = data[i];
            html += `
            <div class="game-card">
                <span class="tag">MOD</span>
                <img loading="lazy" src="${g[1]}" alt="${g[0]}">
                <div class="content">
                    <div class="title">${g[0]}</div>
                    <div class="meta">
                        <div>⭐ ${g[3]}</div>
                        <div style="color:#22c55e; font-weight:bold">${g[4]}</div>
                    </div>
                    <div class="desc">${g[5]}</div>
                    <button class="btn" onclick="openModal('${g[2]}')">Download</button>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    document.getElementById("search").oninput = function(e) {
        let val = e.target.value.toLowerCase();
        let filtered = allGames.filter(g => g[0].toLowerCase().includes(val));
        render(filtered);
    };

    function openModal(link) {
        let m=document.getElementById("modal"), 
            b=document.getElementById("bar"), 
            s=document.getElementById("loading-section"), 
            f=document.getElementById("frame");
        
        m.style.display="flex"; 
        f.style.display="none"; 
        s.style.display="block"; 
        b.style.width="0";

        f.src = link; 

        let p=0;
        let t = setInterval(()=>{
            p += 5; 
            b.style.width = p + "%";
            
            if(p >= 100) {
                clearInterval(t);
                s.style.display="none"; 
                f.style.display = "block"; 
            }
        }, 100);
    }

    function closeModal(){ document.getElementById("modal").style.display="none"; document.getElementById("frame").src=""; }
    function toggleTheme(){ document.body.classList.toggle("dark"); }
    render(allGames);
</script>
