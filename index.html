<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM VAULT</title>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #22c55e;
            --primary-glow: #16a34a;
            --desc: #6c757d;
            --border: #e0e0e0;
        }

        body.dark {
            --bg: #0b0b0b;
            --card: #161616;
            --text: #f0f0f0;
            --desc: #999999;
            --border: #2a2a2a;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        h1 { text-align: center; color: var(--primary); padding: 25px 0 10px 0; margin: 0; font-size: 28px; letter-spacing: 1px; font-weight: 900;}

        .search-bar {
            width: 90%; margin: 15px auto; display: block; padding: 15px;
            border-radius: 30px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text); outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 15px;
        }

        .stats-info { display: flex; justify-content: center; gap: 20px; padding: 5px; font-size: 13px; color: var(--primary); font-weight: bold; }

        .layout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 20px;
        }

        @media(max-width:600px) {
            .layout-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
            .app-box img { height: 130px; }
        }

        .app-box {
            background: var(--card); border-radius: 20px; overflow: hidden;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: 0.3s;
            border: 1px solid var(--border);
        }

        .app-box img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .app-content { padding: 15px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .app-title { font-weight: bold; color: var(--primary); font-size: 15px; }
        .app-desc { font-size: 11px; color: var(--desc); line-height: 1.4; height: 32px; overflow: hidden; }
        
        button.action-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-glow)); border: none; padding: 12px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: auto; color: #fff; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
            transition: 0.2s;
        }
        button.action-btn:active { transform: scale(0.95); }

        .badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--primary); color: #fff; padding: 4px 10px;
            border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .overlay-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; z-index: 9999;
        }

        .dialog-box {
            background: var(--card); width: 90%; max-width: 450px;
            border-radius: 25px; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: pulseEffect 2s infinite;
        }

        @keyframes pulseEffect { 
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.2); } 
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } 
        }

        #process-section { padding: 40px 20px; text-align: center; }
        
        .loader-ring {
            width: 50px; height: 50px; border: 4px solid var(--border);
            border-top: 4px solid var(--primary); border-radius: 50%;
            margin: 0 auto 20px auto; animation: rotateRing 1s linear infinite;
        }
        @keyframes rotateRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .progress-wrap { 
            height: 28px; background: rgba(150, 150, 150, 0.1); 
            border-radius: 30px; position: relative; overflow: hidden; 
            margin: 20px auto; width: 90%;
            border: 1px solid var(--border);
        }

        #progress-fill { 
            height: 100%; width: 0; 
            background: linear-gradient(90deg, #22c55e, #4ade80, #22c55e); 
            background-size: 200% 200%;
            border-radius: 30px; transition: width 0.1s ease; 
            position: absolute; left: 0; top: 0;
            animation: flowColors 2s ease infinite;
        }

        @keyframes flowColors { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #progress-text {
            position: absolute; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%);
            color: var(--text); font-size: 13px; font-weight: 900; z-index: 2;
        }

        .status-title { color: var(--primary); margin: 0 0 10px 0; font-size: 22px; font-weight: 800;}
        .status-desc { color: var(--desc); font-size: 13px; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>PREMIUM VAULT</h1>

    <div class="stats-info">
        <div>👁 Active Users: 4,872</div>
        <div>⬇ Total Installs: 27.4M</div>
    </div>
    
    <button onclick="switchMode()" style="position:fixed; top:15px; right:15px; z-index:1000; background:var(--primary); border:none; border-radius:50%; width:45px; height:45px; cursor:pointer; color:white; font-size:22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">🌓</button>
    
    <input id="search-input" class="search-bar" placeholder="Search premium tools & apps...">

    <div class="layout-grid" id="main-grid"></div>

    <div class="overlay-modal" id="secure-modal">
        <div class="dialog-box">
            <span onclick="closeDialog()" style="cursor:pointer; font-size:35px; position:absolute; top:5px; right:20px; z-index:10001; color:var(--text);">&times;</span>
            <div id="process-section">
                <div class="loader-ring"></div>
                <h2 class="status-title">Secure Gateway</h2>
                
                <div class="progress-wrap">
                    <div id="progress-fill"></div>
                    <div id="progress-text">0%</div>
                </div>
                
                <p id="status-desc" class="status-desc">Initializing encrypted connection...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script src="https://doubtfulimpatient.com/44/2e/6a/442e6ab037de3791b5ed9192669a2e2c.js"></script>
    <script src="https://doubtfulimpatient.com/5f/46/18/5f46188a5354cd2899c784101370d941.js"></script>

</body>
</html>
